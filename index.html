<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackSheep Patriots News</title>
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
.section{border:2px solid gold;border-radius:15px;padding:20px;margin:20px 0}
.title{font-size:36px;font-weight:bold}
.countdown{display:flex;justify-content:center;gap:10px;margin-top:15px}
.box{border:1px solid gold;padding:10px;border-radius:10px}
.box span{display:block;font-size:24px;font-weight:bold}
.button{display:inline-block;margin-top:10px;padding:10px 15px;background:red;color:white;border-radius:8px}
</style>
</head>
<body>
<div class="container">

<div class="section">
<div class="title">BLACKSHEEP PATRIOTS NEWS</div>
<p>Independent Media • Truth Over Comfort • WE UP</p>
</div>

<div class="section">
<h2>Mother's Day Countdown</h2>
<div class="countdown">
<div class="box"><span id="days">--</span>Days</div>
<div class="box"><span id="hours">--</span>Hours</div>
<div class="box"><span id="minutes">--</span>Minutes</div>
<div class="box"><span id="seconds">--</span>Seconds</div>
</div>
<a class="button" href="https://blacksheep-patriots.printful.me/" target="_blank">Shop Now</a>
</div>

</div>

<script>
(function () {
  function updateCountdown() {
    // Mother's Day 2026 ends at 11:59:59 PM Eastern Time
    var target = new Date('2026-05-10T23:59:59-04:00').getTime();
    var now = Date.now();
    var diff = target - now;

    var days = document.getElementById('days');
    var hours = document.getElementById('hours');
    var minutes = document.getElementById('minutes');
    var seconds = document.getElementById('seconds');

    if (!days || !hours || !minutes || !seconds) return;

    if (diff <= 0) {
      days.textContent = '0';
      hours.textContent = '0';
      minutes.textContent = '0';
      seconds.textContent = '0';
      return;
    }

    days.textContent = Math.floor(diff / (1000 * 60 * 60 * 24));
    hours.textContent = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    minutes.textContent = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    seconds.textContent = Math.floor((diff % (1000 * 60)) / 1000);
  }

  window.addEventListener('load', function () {
    updateCountdown();
    setInterval(updateCountdown, 1000);
  });
})();
</script>

</body>
</html>
