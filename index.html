<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackSheep Patriots News</title>
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
.section{border:2px solid gold;border-radius:15px;padding:20px;margin:20px 0}
.title{font-size:36px;font-weight:bold}
.countdown{display:flex;justify-content:center;gap:10px;margin-top:15px}
.box{border:1px solid gold;padding:10px;border-radius:10px}
.box span{display:block;font-size:24px;font-weight:bold}
.button{display:inline-block;margin-top:10px;padding:10px 15px;background:red;color:white;border-radius:8px}
</style>
</head>
<body>
<div class="container">

<div class="section">
<div class="title">BLACKSHEEP PATRIOTS NEWS</div>
<p>Independent Media • Truth Over Comfort • WE UP</p>
</div>

<div class="section">
<h2>Mother's Day Countdown</h2>
<div class="countdown">
<div class="box"><span id="d">--</span>Days</div>
<div class="box"><span id="h">--</span>Hours</div>
<div class="box"><span id="m">--</span>Minutes</div>
<div class="box"><span id="s">--</span>Seconds</div>
</div>
<a class="button" href="https://blacksheep-patriots.printful.me/" target="_blank">Shop Now</a>
</div>

</div>

<script>
function countdown(){
  const target=new Date("May 10, 2026 23:59:59").getTime();
  const now=new Date().getTime();
  const diff=target-now;

  if(diff<=0)return;

  document.getElementById("d").innerText=Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("m").innerText=Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("s").innerText=Math.floor((diff%(1000*60))/1000);
}
setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
